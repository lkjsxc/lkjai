target_tokens: 50000
mode: sft
pretrain_ratio: 0.0
sft_ratio: 1.0
output_dir: data/kimi_synthetic
api_provider: kimi-api
api_base_url: https://api.moonshot.ai/v1
api_model: kimi-k2.6
prompt_dir: tools/kimi-corpus/prompts
prompt_version: api-v1
batch_documents: 8
max_calls: 10
parallelism: 2
timeout_seconds: 180
sleep_between_calls: 1
max_retries: 2
repair_attempts: 1
quarantine_bad_shards: true
stop_file: runs/kimi_corpus/STOP
seed: 42
sft_domains: [direct-finish, read-only-retrieval, mutation-confirmation, failure-safety-recovery]
