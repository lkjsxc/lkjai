[model]
serving_name = "qwen3-1.7b-q4"
serving_family = "Qwen/Qwen3-1.7B"
tuning_family = "Qwen/Qwen3-0.6B"
quantization = "Q4_K_M"
context_tokens = 4096
max_new_tokens = 512
temperature = 0.2

[agent]
max_steps = 6
repair_attempts = 1
memory_top_k = 5

[training]
method = "qlora"
sequence_len = 2048
lora_rank = 16
lora_alpha = 32
load_in_4bit = true
