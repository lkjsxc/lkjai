[model]
serving_name = "lkjai-scratch-60m"
serving_family = "local-scratch-dense-decoder"
model_preset = "scratch-60m"
context_tokens = 1024
max_new_tokens = 512
temperature = 0.2

[agent]
max_steps = 6
repair_attempts = 1
memory_top_k = 5

[training]
method = "scratch-causal-lm"
tokenizer = "byte-bpe"
sequence_len = 1024
layers = 12
hidden_size = 640
heads = 8
kv_heads = 2
ffn_size = 1792
