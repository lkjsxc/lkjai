[model]
serving_name = "lkjai-scratch-20m"
serving_family = "local-scratch-dense-decoder"
model_preset = "scratch-20m"
context_tokens = 1024
max_new_tokens = 512
temperature = 0.2

[agent]
max_steps = 6
repair_attempts = 1
memory_top_k = 5

[training]
objective = "causal_lm_full"
tokenizer = "byte-bpe"
sequence_len = 1024
layers = 8
hidden_size = 448
heads = 8
kv_heads = 2
ffn_size = 1152
batch_size = 2
gradient_accumulation = 4
compile = "auto"
activation_checkpoint = "off"
max_steps = 120000 # optimizer steps
validate_every_optimizer_steps = 250
save_every_optimizer_steps = 1000
resume = "auto"
export_checkpoint = "best"
