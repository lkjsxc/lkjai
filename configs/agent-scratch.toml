[model]
serving_name = "lkjai-scratch-40m"
serving_family = "local-scratch-dense-decoder"
model_preset = "scratch-40m"
context_tokens = 1024
max_new_tokens = 512
temperature = 0.2

[agent]
max_steps = 6
repair_attempts = 1
memory_top_k = 5

[training]
objective = "causal_lm_full"
tokenizer = "byte-bpe"
sequence_len = 1024
layers = 10
hidden_size = 576
heads = 8
kv_heads = 2
ffn_size = 1536
batch_size = 2
gradient_accumulation = 4
compile = "auto"
activation_checkpoint = "every_n"
max_steps = 400000 # optimizer steps
validate_every_optimizer_steps = 3000
save_every_optimizer_steps = 18000
resume = "auto"
export_checkpoint = "best"
