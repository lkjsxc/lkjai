[model]
serving_name = "lkjai-scratch-60m"
serving_family = "local-scratch-dense-decoder"
model_preset = "scratch-60m"
context_tokens = 1024
max_new_tokens = 512
temperature = 0.2

[agent]
max_steps = 6
repair_attempts = 1
memory_top_k = 5

[training]
objective = "causal_lm_full"
tokenizer = "byte-bpe"
sequence_len = 1024
layers = 12
hidden_size = 640
heads = 8
kv_heads = 2
ffn_size = 1792
gradient_accumulation = 8
max_steps = 120000 # optimizer steps
validate_every_optimizer_steps = 250
save_every_optimizer_steps = 1000
resume = "auto"
export_checkpoint = "best"
