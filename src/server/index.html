<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lkjai private console</title>
  <style>body{font-family:sans-serif;margin:2rem}textarea,input{width:100%;margin:.4rem 0}#log{white-space:pre-wrap;border:1px solid #ccc;padding:1rem;min-height:200px}</style>
</head>
<body>
  <h1>lkjai private console</h1>
  <input id="token" type="password" placeholder="ADMIN_TOKEN">
  <textarea id="message" rows="4" placeholder="Ask the librarian agent..."></textarea>
  <button id="send">Send chat</button>
  <button id="list">List records</button>
  <div id="log"></div>
  <script>
    const log = document.getElementById("log");
    const token = document.getElementById("token");
    const message = document.getElementById("message");
    const write = (line) => (log.textContent += line + "\n");
    document.getElementById("send").onclick = async () => {
      const r = await fetch("/api/chat",{method:"POST",headers:{"content-type":"application/json","x-admin-token":token.value},body:JSON.stringify({message:message.value})});
      write(await r.text());
    };
    document.getElementById("list").onclick = async () => {
      const r = await fetch("/api/records/list",{headers:{"x-admin-token":token.value}});
      write(await r.text());
    };
  </script>
</body>
</html>
