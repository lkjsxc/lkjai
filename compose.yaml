name: lkjai

services:
  inference:
    profiles: ["inference", "web"]
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.inference
    ports:
      - "127.0.0.1:${MODEL_PORT:-8081}:8081"
    environment:
      INFERENCE_HOST: 0.0.0.0
      INFERENCE_PORT: 8081
      MODEL_ROOT: /models
      MODEL_NAME: ${MODEL_NAME:-lkjai-scratch-40m}
    volumes:
      - ./data/models:/models
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=5).read()",
        ]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.runtime
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATA_DIR: ${DATA_DIR:-/app/data}
      MODEL_API_URL: ${MODEL_API_URL:-http://inference:8081/v1/chat/completions}
      MODEL_NAME: ${MODEL_NAME:-lkjai-scratch-40m}
      TOOL_WORKSPACE_DIR: ${TOOL_WORKSPACE_DIR:-/app/data/workspace}
      KJXLKJ_API_URL: ${KJXLKJ_API_URL:-http://host.docker.internal:8080}
      KJXLKJ_SESSION_COOKIE: ${KJXLKJ_SESSION_COOKIE:-}
    volumes:
      - ./data:/app/data
      - ./docs:/app/data/workspace/docs:ro
      - ./apps:/app/data/workspace/apps:ro
      - ./training:/app/data/workspace/training:ro
      - ./corpus:/app/data/workspace/corpus:ro
      - ./configs:/app/data/workspace/configs:ro
      - ./README.md:/app/data/workspace/README.md:ro
      - ./Cargo.toml:/app/data/workspace/Cargo.toml:ro
      - ./compose.yaml:/app/data/workspace/compose.yaml:ro
    depends_on:
      inference:
        condition: service_healthy

  train:
    profiles: ["train"]
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.train
    environment:
      DATA_DIR: ${TRAIN_DATA_DIR:-/app/data/train}
      MODEL_NAME: ${MODEL_NAME:-lkjai-scratch-40m}
      TRAIN_PRESET: ${TRAIN_PRESET:-agent}
      TRAIN_CONFIG: ${TRAIN_CONFIG:-/workspace/configs/training/scratch_40m_12h.json}
      TRAIN_BEHAVIORAL_CHECKPOINT: ${TRAIN_BEHAVIORAL_CHECKPOINT:-export}
      TRAIN_COMMITTED_CORPUS_DIR: ${TRAIN_COMMITTED_CORPUS_DIR:-/workspace/corpus/generated/kimi-full-v1}
    volumes:
      - ./data:/app/data
      - ./corpus:/workspace/corpus:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  verify:
    profiles: ["verify"]
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.verify
    working_dir: /workspace
    environment:
      DATA_DIR: /workspace/data/verify
      PYTHONPATH: /workspace/training/package
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - ./data:/workspace/data
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target

volumes:
  verify-cargo:
  verify-target:
