services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lkjai
      POSTGRES_PASSWORD: lkjai
      POSTGRES_DB: lkjai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:

