name: lkjai

services:
  model:
    profiles: ["model"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command:
      - -m
      - /models/${MODEL_GGUF:-qwen3-1.7b-q4.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "${MODEL_CONTEXT_TOKENS:-4096}"
    ports:
      - "127.0.0.1:${MODEL_PORT:-8081}:8080"
    volumes:
      - ./data/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATA_DIR: ${DATA_DIR:-/app/data}
      MODEL_API_URL: ${MODEL_API_URL:-policy:///app/data/train/policy/model.json}
      MODEL_NAME: ${MODEL_NAME:-qwen3-1.7b-q4}
      MODEL_MAX_NEW_TOKENS: ${MODEL_MAX_NEW_TOKENS:-512}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.2}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-6}
      AGENT_REPAIR_ATTEMPTS: ${AGENT_REPAIR_ATTEMPTS:-1}
      TOOL_TIMEOUT_SECS: ${TOOL_TIMEOUT_SECS:-20}
      TOOL_OUTPUT_LIMIT: ${TOOL_OUTPUT_LIMIT:-12000}
    volumes:
      - ./data:/app/data
      - /:/host

  train:
    profiles: ["train"]
    build:
      context: .
      dockerfile: Dockerfile.train
    environment:
      DATA_DIR: ${TRAIN_DATA_DIR:-/app/data/train}
      TRAIN_PRESET: ${TRAIN_PRESET:-quick}
      TRAIN_BASE_MODEL: ${TRAIN_BASE_MODEL:-Qwen/Qwen3-0.6B}
      TRAIN_SEQUENCE_LEN: ${TRAIN_SEQUENCE_LEN:-2048}
      TRAIN_LORA_RANK: ${TRAIN_LORA_RANK:-16}
      TRAIN_LORA_ALPHA: ${TRAIN_LORA_ALPHA:-32}
      TRAIN_LEARNING_RATE: ${TRAIN_LEARNING_RATE:-1e-4}
      TRAIN_LOAD_IN_4BIT: ${TRAIN_LOAD_IN_4BIT:-1}
      TRAIN_GRADIENT_CHECKPOINTING: ${TRAIN_GRADIENT_CHECKPOINTING:-1}
      TRAIN_FIXED_EVAL_THRESHOLD: ${TRAIN_FIXED_EVAL_THRESHOLD:-0.8}
      TRAIN_ENFORCE_COMPETENCY: ${TRAIN_ENFORCE_COMPETENCY:-0}
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  verify:
    profiles: ["verify"]
    build:
      context: .
      dockerfile: Dockerfile.verify
    working_dir: /workspace
    environment:
      DATA_DIR: /workspace/data/verify
      PYTHONPATH: /workspace/training
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - ./data:/workspace/data
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target

volumes:
  verify-cargo:
  verify-target:
