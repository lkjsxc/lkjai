name: lkjai

services:
  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      APP_HOST: ${APP_HOST:-127.0.0.1}
      APP_PORT: ${APP_PORT:-8080}
      DATA_DIR: ${DATA_DIR:-/app/data}
      MODEL_DIR: ${MODEL_DIR:-/app/data/models/lkj-150m}
      TOOL_TIMEOUT_SECS: ${TOOL_TIMEOUT_SECS:-20}
      TOOL_OUTPUT_LIMIT: ${TOOL_OUTPUT_LIMIT:-12000}
    volumes:
      - ./data:/app/data
      - /:/host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  train:
    profiles: ["train"]
    build:
      context: .
      dockerfile: Dockerfile.train
    environment:
      DATA_DIR: ${TRAIN_DATA_DIR:-/app/data/train}
      TRAIN_PRESET: ${TRAIN_PRESET:-longrun}
      TRAIN_CONFIG: ${TRAIN_CONFIG:-/workspace/configs/lkj-150m.toml}
      TRAIN_DATASET: ${TRAIN_DATASET:-HuggingFaceFW/fineweb-edu}
      TRAIN_CONTEXT: ${TRAIN_CONTEXT:-0}
      TRAIN_MAX_ARTIFACT_MIB: ${TRAIN_MAX_ARTIFACT_MIB:-512}
      TRAIN_STEPS: ${TRAIN_STEPS:-512}
      TRAIN_MAX_DURATION_SECS: ${TRAIN_MAX_DURATION_SECS:-21600}
      TRAIN_FIXED_EVAL_THRESHOLD: ${TRAIN_FIXED_EVAL_THRESHOLD:-0.8}
      TRAIN_ENFORCE_COMPETENCY: ${TRAIN_ENFORCE_COMPETENCY:-1}
      TRAIN_TINY: ${TRAIN_TINY:-0}
      TRAIN_TOKEN_BUDGET: ${TRAIN_TOKEN_BUDGET:-3000000000}
      TRAIN_VOCAB_SIZE: ${TRAIN_VOCAB_SIZE:-32000}
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  verify:
    profiles: ["verify"]
    build:
      context: .
      dockerfile: Dockerfile.verify
    working_dir: /workspace
    environment:
      DATA_DIR: /workspace/data/verify
      PYTHONPATH: /workspace/training
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - ./data:/workspace/data
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target

volumes:
  verify-cargo:
  verify-target:
