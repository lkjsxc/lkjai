name: lkjai

services:
  inference:
    profiles: ["inference", "web"]
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "127.0.0.1:${MODEL_PORT:-8081}:8081"
    environment:
      INFERENCE_HOST: 0.0.0.0
      INFERENCE_PORT: 8081
      MODEL_ROOT: /models
      MODEL_NAME: ${MODEL_NAME:-lkjai-scratch-40m}
    volumes:
      - ./data/models:/models
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/v1/models', timeout=5).read()",
        ]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATA_DIR: ${DATA_DIR:-/app/data}
      MODEL_API_URL: ${MODEL_API_URL:-http://inference:8081/v1/chat/completions}
      MODEL_NAME: ${MODEL_NAME:-lkjai-scratch-40m}
      MODEL_MAX_NEW_TOKENS: ${MODEL_MAX_NEW_TOKENS:-512}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.2}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-6}
      AGENT_REPAIR_ATTEMPTS: ${AGENT_REPAIR_ATTEMPTS:-1}
      TOOL_WORKSPACE_DIR: ${TOOL_WORKSPACE_DIR:-/app/data/workspace}
      TOOL_TIMEOUT_SECS: ${TOOL_TIMEOUT_SECS:-20}
      TOOL_OUTPUT_LIMIT: ${TOOL_OUTPUT_LIMIT:-12000}
      KJXLKJ_API_URL: ${KJXLKJ_API_URL:-http://host.docker.internal:8080}
      KJXLKJ_SESSION_COOKIE: ${KJXLKJ_SESSION_COOKIE:-}
    volumes:
      - ./data:/app/data
      - ./docs:/app/data/workspace/docs:ro
      - ./src:/app/data/workspace/src:ro
      - ./training:/app/data/workspace/training:ro
      - ./README.md:/app/data/workspace/README.md:ro
      - ./Cargo.toml:/app/data/workspace/Cargo.toml:ro
      - ./docker-compose.yml:/app/data/workspace/docker-compose.yml:ro
    depends_on:
      inference:
        condition: service_healthy

  train:
    profiles: ["train"]
    build:
      context: .
      dockerfile: Dockerfile.train
    environment:
      DATA_DIR: ${TRAIN_DATA_DIR:-/app/data/train}
      MODEL_NAME: ${MODEL_NAME:-}
      TRAIN_PRESET: ${TRAIN_PRESET:-agent}
      TRAIN_CONFIG: ${TRAIN_CONFIG:-/workspace/configs/training/scratch_40m_12h.json}
      TRAIN_MODEL_PRESET: ${TRAIN_MODEL_PRESET:-}
      TRAIN_OBJECTIVE: ${TRAIN_OBJECTIVE:-}
      TRAIN_VOCAB_SIZE: ${TRAIN_VOCAB_SIZE:-}
      TRAIN_SEQUENCE_LEN: ${TRAIN_SEQUENCE_LEN:-}
      TRAIN_LAYERS: ${TRAIN_LAYERS:-}
      TRAIN_HIDDEN_SIZE: ${TRAIN_HIDDEN_SIZE:-}
      TRAIN_HEADS: ${TRAIN_HEADS:-}
      TRAIN_KV_HEADS: ${TRAIN_KV_HEADS:-}
      TRAIN_FFN_SIZE: ${TRAIN_FFN_SIZE:-}
      TRAIN_LEARNING_RATE: ${TRAIN_LEARNING_RATE:-}
      TRAIN_DROPOUT: ${TRAIN_DROPOUT:-}
      TRAIN_ACTIVATION_CHECKPOINT: ${TRAIN_ACTIVATION_CHECKPOINT:-}
      TRAIN_CHECKPOINT_PRESERVE_RNG: ${TRAIN_CHECKPOINT_PRESERVE_RNG:-}
      TRAIN_BATCH_SIZE: ${TRAIN_BATCH_SIZE:-}
      TRAIN_GRADIENT_ACCUMULATION: ${TRAIN_GRADIENT_ACCUMULATION:-}
      TRAIN_BATCH_POLICY: ${TRAIN_BATCH_POLICY:-}
      TRAIN_MAX_STEPS: ${TRAIN_MAX_STEPS:-}
      TRAIN_MAX_OPTIMIZER_STEPS: ${TRAIN_MAX_OPTIMIZER_STEPS:-}
      TRAIN_MAX_MICROSTEPS: ${TRAIN_MAX_MICROSTEPS:-}
      TRAIN_VALIDATE_EVERY_OPTIMIZER_STEPS: ${TRAIN_VALIDATE_EVERY_OPTIMIZER_STEPS:-}
      TRAIN_SAVE_LATEST_EVERY_OPTIMIZER_STEPS: ${TRAIN_SAVE_LATEST_EVERY_OPTIMIZER_STEPS:-}
      TRAIN_INTERMEDIATE_SAVE_EVERY_OPTIMIZER_STEPS: ${TRAIN_INTERMEDIATE_SAVE_EVERY_OPTIMIZER_STEPS:-}
      TRAIN_KEEP_LAST_CHECKPOINTS: ${TRAIN_KEEP_LAST_CHECKPOINTS:-}
      TRAIN_VALIDATION_BATCHES: ${TRAIN_VALIDATION_BATCHES:-}
      TRAIN_RESUME: ${TRAIN_RESUME:-}
      TRAIN_AMP: ${TRAIN_AMP:-}
      TRAIN_COMPILE: ${TRAIN_COMPILE:-}
      TRAIN_COMPILE_WARMUP_MICROSTEPS: ${TRAIN_COMPILE_WARMUP_MICROSTEPS:-}
      TRAIN_STATIC_SHAPES: ${TRAIN_STATIC_SHAPES:-}
      TRAIN_ATTENTION_BACKEND: ${TRAIN_ATTENTION_BACKEND:-}
      TRAIN_EXPORT_CHECKPOINT: ${TRAIN_EXPORT_CHECKPOINT:-}
      TRAIN_BEHAVIORAL_CHECKPOINT: ${TRAIN_BEHAVIORAL_CHECKPOINT:-export}
      TRAIN_FIXED_EVAL_THRESHOLD: ${TRAIN_FIXED_EVAL_THRESHOLD:-}
      TRAIN_BEHAVIORAL_THRESHOLD: ${TRAIN_BEHAVIORAL_THRESHOLD:-}
      TRAIN_ENFORCE_COMPETENCY: ${TRAIN_ENFORCE_COMPETENCY:-}
      TRAIN_CORPUS_SIZE: ${TRAIN_CORPUS_SIZE:-}
      TRAIN_CORPUS_TOKENS: ${TRAIN_CORPUS_TOKENS:-}
      TRAIN_CORPUS_DIR: ${TRAIN_CORPUS_DIR:-}
      TRAIN_CURRICULUM: ${TRAIN_CURRICULUM:-}
      TRAIN_COMMITTED_CORPUS_DIR: ${TRAIN_COMMITTED_CORPUS_DIR:-/workspace/training/corpus/kimi-full-v1}
      TRAIN_DATALOADER_IMPL: ${TRAIN_DATALOADER_IMPL:-}
      TRAIN_DATA_MODE: ${TRAIN_DATA_MODE:-}
      TRAIN_DPO_STEPS: ${TRAIN_DPO_STEPS:-200}
      TRAIN_DPO_BETA: ${TRAIN_DPO_BETA:-0.1}
    volumes:
      - ./data:/app/data
      - ./training/corpus:/workspace/training/corpus:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  verify:
    profiles: ["verify"]
    build:
      context: .
      dockerfile: Dockerfile.verify
    working_dir: /workspace
    environment:
      DATA_DIR: /workspace/data/verify
      PYTHONPATH: /workspace/training
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - ./data:/workspace/data
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target

volumes:
  verify-cargo:
  verify-target:
